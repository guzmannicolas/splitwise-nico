<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo indigo -->
  <rect width="512" height="512" fill="#4F46E5" rx="86"/>
  
  <!-- Ícono de billete/dinero (SVG simple) -->
  <g transform="translate(96, 150)">
    <!-- Billete -->
    <rect x="0" y="50" width="320" height="160" rx="20" fill="#FFFFFF" opacity="0.95"/>
    
    <!-- Círculo central (símbolo $) -->
    <circle cx="160" cy="130" r="54" fill="#4F46E5" opacity="0.3"/>
    
    <!-- Símbolo $ -->
    <text x="160" y="165" font-family="Arial, sans-serif" font-size="96" font-weight="bold" fill="#FFFFFF" text-anchor="middle">$</text>
    
    <!-- Detalles decorativos -->
    <circle cx="40" cy="90" r="16" fill="#4F46E5" opacity="0.2"/>
    <circle cx="40" cy="170" r="16" fill="#4F46E5" opacity="0.2"/>
    <circle cx="280" cy="90" r="16" fill="#4F46E5" opacity="0.2"/>
    <circle cx="280" cy="170" r="16" fill="#4F46E5" opacity="0.2"/>
  </g>
</svg>
